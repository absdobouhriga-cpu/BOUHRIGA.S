}

<body>

<div class="container">
<img src="logo.png" style="width:150px; display:block; margin:auto;">
<h1>Bouhriga Assurance</h1>

<form id="form">

<label>Nom</label>
<input id="nom" required>

<label>Prénom</label>
<input id="prenom" required>

<label>CIN</label>
<input id="cin" required>

<label>Téléphone</label>
<input id="tel" required>

<label>Email</label>
<input id="email" type="email" required>

<label>Type de contrat</label>

<option>Auto</option>
<option>Habitation</option>
<option>Santé</option>
</select>

<h3>Documents (recto/verso)</h3>

<label>CIN Recto</label><input type="file" id="cin_r">
<label>CIN Verso</label><input type="file" id="cin_v">
<label>Carte Grise Recto</label><input type="file" id="cg_r">
<label>Carte Grise Verso</label><input type="file" id="cg_v">
<label>Permis Recto</label><input type="file" id="p_r">

<button type="button" onclick="sendDossier()">Envoyer le dossier complet</button>

</form>

</div>

async function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

async function sendDossier() {

    const pdfBlob = await generatePDF();
    const pdfBase64 = await fileToBase64(pdfBlob);

    let attachments = [
        {
            filename: "Dossier_Bouhriga.pdf",
            content: pdfBase64
        }
    ];

    const fileInputs = ["cin_r","cin_v","cg_r","cg_v","p_r","p_v"];

    for (let id of fileInputs) {
        let f = document.getElementById(id).files[0];
        if (f) {
            let b64 = await fileToBase64(f);
            attachments.push({
                filename: f.name,
                content: b64
            });
        }
    }
